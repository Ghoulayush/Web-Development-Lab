<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Stopwatch</title>
    <style>
      body {
        font-family: Arial;
        background-color: white;
        padding: 20px;
      }

      .container {
        background-color: white;
        padding: 20px;
        border: 1px solid black;
        text-align: center;
        width: 400px;
      }

      h1 {
        margin-bottom: 20px;
        font-size: 24px;
      }

      .display {
        background-color: black;
        color: white;
        font-size: 36px;
        font-weight: bold;
        padding: 20px;
        margin-bottom: 20px;
        font-family: Courier New;
        text-align: center;
        border: 1px solid black;
      }

      .button-group {
        margin-bottom: 20px;
      }

      button {
        padding: 10px 20px;
        font-size: 14px;
        font-weight: bold;
        border: 1px solid black;
        cursor: pointer;
        margin: 5px;
        background-color: lightgray;
      }

      .start-btn {
        background-color: green;
        color: white;
      }

      .pause-btn {
        background-color: orange;
        color: white;
      }

      .reset-btn {
        background-color: red;
        color: white;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .lap-section {
        margin-top: 20px;
        text-align: left;
      }

      .lap-section h3 {
        margin-bottom: 10px;
      }

      .lap-list {
        background-color: white;
        border: 1px solid black;
        max-height: 200px;
        overflow-y: auto;
        padding: 5px;
      }

      .lap-item {
        padding: 5px;
        border-bottom: 1px solid gray;
        font-family: Courier New;
      }

      .lap-item:last-child {
        border-bottom: none;
      }

      .empty-message {
        color: gray;
        text-align: center;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Stopwatch</h1>

      <div class="display" id="timeDisplay">00:00:00</div>

      <div class="button-group">
        <button class="start-btn" id="startBtn" onclick="startStopwatch()">
          Start
        </button>
        <button
          class="pause-btn"
          id="pauseBtn"
          onclick="pauseStopwatch()"
          disabled
        >
          Pause
        </button>
        <button class="reset-btn" id="resetBtn" onclick="resetStopwatch()">
          Reset
        </button>
      </div>
    </div>

    <script>
      var t = 0,
        run = false,
        timer = 0;

      function show() {
        var s = Math.floor(t / 1000),
          h = Math.floor(s / 3600),
          m = Math.floor((s % 3600) / 60),
          sec = s % 60;
        if (h < 10) h = "0" + h;
        if (m < 10) m = "0" + m;
        if (sec < 10) sec = "0" + sec;
        document.getElementById("timeDisplay").innerHTML =
          h + ":" + m + ":" + sec;
      }

      function startStopwatch() {
        if (run) return;
        run = true;
        document.getElementById("startBtn").disabled = true;
        document.getElementById("pauseBtn").disabled = false;
        var start = Date.now() - t;
        timer = setInterval(function () {
          t = Date.now() - start;
          show();
        }, 10);
      }

      function pauseStopwatch() {
        if (!run) return;
        run = false;
        clearInterval(timer);
        document.getElementById("startBtn").disabled = false;
        document.getElementById("pauseBtn").disabled = true;
      }

      function resetStopwatch() {
        clearInterval(timer);
        run = false;
        t = 0;
        show();
        document.getElementById("startBtn").disabled = false;
        document.getElementById("pauseBtn").disabled = true;
      }

      show();
    </script>
  </body>
</html>
