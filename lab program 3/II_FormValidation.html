<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Form Validation</title>
    <style>
      body {
        font-family: Arial;
        background-color: white;
      }
      .container {
        border: 1px solid black;
        width: 400px;
        padding: 20px;
        margin: 20px;
      }
      label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
      }
      input {
        width: 300px;
        padding: 5px;
        margin-top: 5px;
        border: 1px solid black;
      }
      .error-message {
        color: red;
        font-size: 12px;
        display: none;
      }
      .error-message.show {
        display: block;
      }
      button {
        padding: 8px 15px;
        margin-top: 15px;
        margin-right: 10px;
        background-color: green;
        color: white;
        border: 1px solid black;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Form Validation</h1>

    <div class="container">
      <form id="validationForm" onsubmit="return validateForm();">
        <label>Name:</label>
        <input type="text" id="name" onblur="validateName()" />
        <div class="error-message" id="nameError"></div>

        <label>Email:</label>
        <input type="email" id="email" onblur="validateEmail()" />
        <div class="error-message" id="emailError"></div>

        <label>Mobile Number:</label>
        <input type="text" id="mobile" onblur="validateMobile()" />
        <div class="error-message" id="mobileError"></div>

        <br />
        <button type="submit">Submit</button>
        <button type="reset" onclick="resetForm()">Reset</button>
      </form>
    </div>

    <script>
      function validateName() {
        var name = document.getElementById("name").value;
        var error = document.getElementById("nameError");

        error.classList.remove("show");
        if (name === "") {
          error.innerHTML = "Name is required";
          error.classList.add("show");
          return false;
        }

        if (name.length < 3) {
          error.innerHTML = "Name must be at least 3 letters";
          error.classList.add("show");
          return false;
        }

        if (!/^[a-zA-Z\s]+$/.test(name)) {
          error.innerHTML = "Only letters and spaces allowed";
          error.classList.add("show");
          return false;
        }

        return true;
      }

      function validateEmail() {
        var email = document.getElementById("email").value;
        var error = document.getElementById("emailError");

        error.classList.remove("show");
        if (email === "") {
          error.innerHTML = "Email is required";
          error.classList.add("show");
          return false;
        }

        if (!/^[^@]+@[^@]+\.[a-z]+$/i.test(email)) {
          error.innerHTML = "Enter a valid email";
          error.classList.add("show");
          return false;
        }

        return true;
      }

      function validateMobile() {
        var mobile = document.getElementById("mobile").value;
        var error = document.getElementById("mobileError");

        error.classList.remove("show");
        if (mobile === "") {
          error.innerHTML = "Mobile number is required";
          error.classList.add("show");
          return false;
        }

        if (!/^[0-9]{10}$/.test(mobile)) {
          error.innerHTML = "Mobile number must be 10 digits";
          error.classList.add("show");
          return false;
        }

        return true;
      }

      function validateForm() {
        var a = validateName();
        var b = validateEmail();
        var c = validateMobile();

        if (a && b && c) {
          alert("Form submitted successfully");
        }

        return false;
      }

      function resetForm() {
        document.getElementById("validationForm").reset();
        document.getElementById("nameError").classList.remove("show");
        document.getElementById("emailError").classList.remove("show");
        document.getElementById("mobileError").classList.remove("show");
      }
    </script>
  </body>
</html>
